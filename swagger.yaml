openapi: 3.0.0
info:
  title: High-Scalability Campaign Management API
  version: 1.0.0
  description: |
    A robust MERN-stack backend designed to handle millions of records using Node.js Cluster, RabbitMQ, and Redis.
    
    ### Core Features:
    - **Bulk Processing**: Efficient CSV parsing and batched MongoDB insertions.
    - **Competing Consumers**: RabbitMQ workers with configurable prefetch and concurrency.
    - **Scalable Search**: Atlas Search (Lucene) integration for global partial & fuzzy matching across millions of contacts.
    - **Targeting System**: Flexible audience selection (Global, Tag-based, or Single Contact).
    
servers:
  - url: http://localhost:3000
    description: Development Server
paths:
  /api/contacts/upload:
    post:
      summary: Upload contacts via CSV
      description: |
        Accepts a Cloudinary URL of a CSV file. The file is streamed, validated (phone is mandatory), 
        batched into groups of 5,000, and pushed to RabbitMQ for background processing. 
        Duplicates are automatically skipped.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                csvUrl:
                  type: string
                  description: Publicly accessible URL of the CSV file.
                  example: "https://res.cloudinary.com/demo/raw/upload/v1/contacts.csv"
      responses:
        '202':
          description: Upload job accepted and processing in background.
  /api/contacts:
    get:
      summary: List contacts with search/filter
      description: |
        Uses cursor-based pagination for high performance. 
        Global partial (autocomplete) and fuzzy search is available on name, email, phone, and tags via Atlas Search.
      parameters:
        - name: limit
          in: query
          description: Number of records to return.
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          description: Base64 cursor for the next page.
          schema:
            type: string
        - name: search
          in: query
          description: Global partial search term for name, email, phone, or tags (Autocomplete enabled).
          schema:
            type: string
      responses:
        '200':
          description: List of contacts and the next cursor.
  /api/campaigns:
    post:
      summary: Create a campaign draft
      description: Initializes a campaign with a name and message template.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                template:
                  type: string
      responses:
        '201':
          description: Campaign created successfully.
    get:
      summary: List all campaigns
      description: |
        Uses cursor-based pagination for high performance.
      parameters:
        - name: limit
          in: query
          description: Number of records to return.
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          description: Base64 cursor for the next page.
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of campaigns.
  /api/campaigns/{id}/start:
    post:
      summary: Start/Trigger a campaign
      description: |
        Triggers the asynchronous execution of a campaign. 
        You MUST provide a targeting strategy in the payload.
        
        **Targeting Priority:**
        
        *   **all_selected: true** — Sends to EVERY contact in the database.
        *   **tags: ["vip"]** — Sends to contacts matching these metadata tags.
        
        *Note: The system checks these in order. If all_selected is true, other filters are ignored.*
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                all_selected:
                  type: boolean
                  description: Set to true to ignore filters and target everyone.
                tags:
                  type: array
                  items:
                    type: string
                  description: List of tags to match directly against the contact's tags field.
                created_after:
                  type: string
                  format: date-time
                  description: Target contacts created on or after this ISO date.
                created_before:
                  type: string
                  format: date-time
                  description: Target contacts created on or before this ISO date.
              example:
                all_selected: false
                tags: ["premium-user"]
                created_after: "2023-01-01T00:00:00Z"
                created_before: "2023-12-31T23:59:59Z"
      responses:
        '200':
          description: Campaign execution initialized.
  /api/campaigns/{id}:
    get:
      summary: Campaign dashboard and metrics
      description: Returns real-time metrics (Sent, Failed, Pending) for a specific campaign.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Metrics retrieved.

